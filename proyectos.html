<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfiles del Equipo</title>
    <style>
        /* Estilos súper básicos */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }

        /* Cada tarjeta de perfil */
        .perfil {
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            width: 220px;
            display: inline-block; /* Los coloca uno al lado del otro */
            text-align: center;
        }

        /* Tamaño grande para el emoji */
        .avatar {
            font-size: 60px;
            margin-bottom: 10px;
        }

        /* Colores simples para diferenciar roles */
        .rol-docente {
            color: #d35400; /* Naranja */
            font-weight: bold;
        }

        .rol-alumno {
            color: #2980b9; /* Azul */
            font-weight: bold;
        }

        /* Corregimos aquí también: aplicamos el margen al h2 en lugar del h3 */
        h2, p {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <h1>Directorio del Equipo</h1>

    <div class="perfil">
        <div class="avatar">👩‍🏫</div>
        <h2>Elena Rojas</h2>
        <p class="rol-docente">Docente</p>
        <p>Ingeniería de Software</p>
    </div>

    <div class="perfil">
        <div class="avatar">👨‍🏫</div>
        <h2>Martín Suarez</h2>
        <p class="rol-docente">Docente</p>
        <p>Bases de Datos</p>
    </div>

    <div class="perfil">
        <div class="avatar">👩‍💻</div>
        <h2>Sofía Castro</h2>
        <p class="rol-alumno">Alumna</p>
        <p>Frontend</p>
    </div>

    <div class="perfil">
        <div class="avatar">👨‍💻</div>
        <h2>Diego Torres</h2>
        <p class="rol-alumno">Alumno</p>
        <p>Backend</p>
    </div>

    <div class="perfil">
        <div class="avatar">👩‍🎓</div>
        <h2>Valentina Paz</h2>
        <p class="rol-alumno">Alumna</p>
        <p>Análisis de Datos</p>
    </div>

</body>
</html>
